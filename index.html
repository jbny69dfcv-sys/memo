<!DOCTYPE html>
<html lang="ja">
<head>

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMemo</title>

    <link rel="stylesheet" href="style.css">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css"
    >

    <script
        src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"
    ></script>
</head>
<div id="imageModal" class="image-modal">
<div
    id="videoModal"
    class="image-modal"
>

    <video
        id="modalVideo"
        class="modal-image"
        controls
    ></video>

</div>
    <img
        id="modalImage"
        class="modal-image"
        src=""
    >

</div>
<body>

    <div class="accounts" id="accounts"></div>

<div class="floating-buttons">

    <button
        id="searchButton"
    >
        🔍
    </button>

    <button
        id="postButton"
    >
    </button>

</div>

    <div id="timeline"></div>

    <div id="profilePage" style="display:none;">

        <button id="backButton">
            ← タイムライン
        </button>

 <div class="profile-header">

    <img
        id="headerImage"
        class="header-image"
        src=""
    >

    <button
        id="editHeaderButton"
        class="edit-header-button"
    >
        ✏️
    </button>

</div>

        <div class="profile-info">

            <img
                id="profileIcon"
                class="profile-icon"
                src=""
            >

            <h2 id="profileName"></h2>
            <p id="profileId"></p>
            <p id="profileBio"></p>
            <p id="postCount"></p>
            <button id="deleteAccountButton">
    アカウント削除
</button>
<div class="follow-stats">

    <span id="followingCount">
        0 フォロー中
    </span>

    <span id="followerCount">
        0 フォロワー
    </span>

</div>
       
<input
    type="file"
    id="headerUpload"
    accept="image/*"
    style="display:none;"
>

          <input
    type="file"
    id="iconUpload"
    accept="image/*"
    style="display:none;"
>

 <div class="profile-tabs">

    <button
        id="postsTab"
        class="profile-tab active"
    >
        投稿
    </button>

    <button
        id="likesTab"
        class="profile-tab"
    >
        スキ
    </button>

</div>

<div id="profileTimeline"></div>
    

        </div>

    </div>

<div
    id="postDetailPage"
    style="display:none;"
>

    <button
        id="backFromDetailButton"
    >
        ← 戻る
    </button>

    <div
        id="detailPost"
    ></div>

    <h3>
        コメント
    </h3>

    <div
        id="detailComments"
    ></div>

    <textarea
        id="detailCommentInput"
        placeholder="コメントを書く..."
    ></textarea>

    <button
        id="detailCommentButton"
    >
        送信
    </button>

</div>

 <div id="postModal" class="modal">

<div class="post-modal-content">

    <div class="post-top-bar">

        <button
            id="closeModalButton"
            class="top-button"
        >
            キャンセル
        </button>

        <button
            id="modalPostButton"
            class="top-button"
        >
            投稿
        </button>

    </div>
<div class="post-content"></div>
    <div class="post-user-area">

        <img
            id="postUserIcon"
            class="post-user-icon"
            src=""
        >

        <textarea
            id="modalPostInput"
            placeholder="いまなにしてる？"
        ></textarea>

    </div>

<input
    type="file"
    id="postImageUpload"
    accept="image/*,video/*"
    multiple
>

    <div id="postImagePreviewArea">

        <div class="preview-container">

            <img
                id="postImagePreview"
            >

            <button
                id="removePostImageButton"
                type="button"
            >
                ×
            </button>

        </div>

    </div>

    </div> <!-- postImagePreviewArea -->

</div> <!-- post-content -->

</div> <!-- post-modal-content -->

</div> <!-- postModal -->
   

<div
    id="editProfileModal"
    class="modal"
    style="
        display:none;
        z-index:10000;
    "
>

    <div class="modal-content">

        <button
            id="saveProfileButton"
        >
            保存
        </button>

        <button
            id="cancelProfileButton"
        >
            キャンセル
        </button>

        <h2>
            プロフィール編集
        </h2>

        <div class="edit-header-area">

            <img
                id="editHeaderPreview"
                class="edit-header-preview"
                src=""
            >

        </div>

        <div class="edit-icon-area">

            <img
                id="editIconPreview"
                class="edit-icon-preview"
                src=""
            >

        </div>

        <div class="edit-field">

            <label>
                名前
            </label>

            <input
                type="text"
                id="editName"
            >

        </div>

        <div class="edit-field">

            <label>
                ID
            </label>

            <input
                type="text"
                id="editId"
            >

        </div>

        <div class="edit-field">

            <label>
                自己紹介
            </label>

            <textarea
                id="editBio"
            ></textarea>

        </div>

    </div>

<div
    id="headerModal"
    class="modal"
>

    <img
        id="headerModalImage"
        class="modal-image"
    >

</div>

</div>

<div
    id="cropModal"
    class="modal"
    style="display:none;"
>

    <div class="modal-content">

        <h2>
            画像を切り抜く
        </h2>

<img
    id="cropImage"
    style="
        max-width:100%;
        display:block;
    "
>

<div class="crop-buttons">

    <button id="cropConfirmButton">
        決定
    </button>

    <button id="cropCancelButton">
        キャンセル
    </button>

</div>

        <img
            id="cropImage"
            style="
                max-width:100%;
                display:block;
            "
        >

    </div>

</div>

<div
    id="commentModal"
    class="modal"
    style="display:none;"
>

    <div class="modal-content">

        <button
            id="closeCommentButton"
        >
            閉じる
        </button>

        <h2>
            コメント
        </h2>

        <div
            id="commentList"
        >
        </div>

        <textarea
            id="commentInput"
            placeholder="コメントを書く..."
        ></textarea>

        <button
            id="sendCommentButton"
        >
            送信
        </button>

    </div>

</div>

<div
    id="searchPage"
    style="display:none;"
>

    <div class="search-header">

        <button
            id="backSearchButton"
        >
            ←
        </button>

        <input
            id="searchInput"
            type="text"
            placeholder="検索"
        >

    </div>

    <div
        id="searchHistory"
    >

    </div>

    <div
    id="searchResults"
></div>

</div>

<script src="js/main.js"></script>

</body>

</html>
